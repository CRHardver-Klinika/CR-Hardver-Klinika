<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Hardver Klinika</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            cyan: '#00d2d3',
                            teal: '#08f7fe',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #e2e8f0; overflow-x: hidden; }
        .cinematic-vignette {
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React, ReactDOM, Motion, Lucide Icons CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useRef, useEffect } = React;
        const { motion, useScroll, useTransform, useSpring } = FramerMotion;

        // FONTOS: Ha GitHub-on használod, nevezd el a képeidet így, 
        // és rakd őket ugyanabba a mappába, mint ezt az index.html fájlt!
        const IMAGES = {
            hero: "hero.png",
            cpu: "cpu_detail.png",
            gpu: "gpu_zoom.png",
            devices: "devices.png",
            logo: "logo.png"
        };

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const containerRef = useRef(null);
            const { scrollYProgress } = useScroll({
                target: containerRef,
                offset: ["start start", "end end"],
            });

            const smoothProgress = useSpring(scrollYProgress, {
                stiffness: 100,
                damping: 30,
                restDelta: 0.001
            });

            const heroScale = useTransform(smoothProgress, [0, 0.25], [1, 3.5]);
            const heroOpacity = useTransform(smoothProgress, [0.15, 0.3], [1, 0]);
            const cpuScale = useTransform(smoothProgress, [0.15, 0.3, 0.5, 0.6], [0.8, 1, 1.2, 2]);
            const cpuOpacity = useTransform(smoothProgress, [0.2, 0.3, 0.55, 0.65], [0, 1, 1, 0]);
            const gpuScale = useTransform(smoothProgress, [0.5, 0.65, 0.8, 0.9], [0.8, 1, 1.2, 2]);
            const gpuOpacity = useTransform(smoothProgress, [0.5, 0.6, 0.85, 0.95], [0, 1, 1, 0]);
            const devicesScale = useTransform(smoothProgress, [0.8, 0.95, 1], [1.2, 1, 1]);
            const devicesOpacity = useTransform(smoothProgress, [0.85, 0.95], [0, 1]);

            return (
                <div className="relative font-sans">
                    <nav className="fixed top-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-4xl">
                        <div className="bg-white/90 backdrop-blur-md rounded-2xl py-3 px-8 flex items-center justify-between shadow-2xl border border-white/20">
                            <div className="flex items-center gap-3">
                                <img src={IMAGES.logo} alt="Logo" className="h-10 w-auto" />
                                <div className="hidden sm:block">
                                    <h1 className="text-black font-bold tracking-tighter text-sm uppercase">CR Hardver Klinika</h1>
                                    <p className="text-[10px] text-gray-500 font-medium tracking-widest uppercase">Premium Tech Service</p>
                                </div>
                            </div>
                            <ul className="flex items-center gap-6">
                                {['Home', 'Services', 'Portfolio', 'Contact'].map((item) => (
                                    <li key={item}>
                                        <a href={`#${item.toLowerCase()}`} className="text-black/70 hover:text-black transition-colors font-semibold text-xs tracking-widest uppercase">[{item}]</a>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </nav>

                    <main ref={containerRef} className="relative h-[600vh]">
                        <div className="sticky top-0 h-screen w-full overflow-hidden">
                            <motion.div className="absolute inset-0 flex items-center justify-center" style={{ scale: heroScale, opacity: heroOpacity }}>
                                <img src={IMAGES.hero} alt="Workshop" className="w-full h-full object-cover" />
                                <div className="absolute inset-0 cinematic-vignette" />
                                <div className="absolute inset-0 bg-black/30 flex flex-col items-center justify-center text-center px-4">
                                    <h2 className="text-5xl md:text-8xl font-bold text-white tracking-tighter mb-4 drop-shadow-2xl">CR HARDVER <span className="text-brand-teal">KLINIKA</span></h2>
                                    <p className="text-lg md:text-xl text-slate-200 max-w-2xl font-medium tracking-wide drop-shadow-lg uppercase">MŰhelyünk ahol a technológia életre kel</p>
                                </div>
                            </motion.div>

                            <motion.div className="absolute inset-0 flex items-center justify-center" style={{ scale: cpuScale, opacity: cpuOpacity }}>
                                <img src={IMAGES.cpu} alt="CPU" className="w-full h-full object-cover" />
                                <div className="absolute inset-0 cinematic-vignette" />
                                <div className="absolute bottom-24 left-1/2 -translate-x-1/2 w-full max-w-4xl px-8">
                                    <h3 className="text-4xl md:text-6xl font-bold text-white tracking-tight uppercase">PRECÍZIÓS HŰTÉS</h3>
                                </div>
                            </motion.div>

                            <motion.div className="absolute inset-0 flex items-center justify-center" style={{ scale: gpuScale, opacity: gpuOpacity }}>
                                <img src={IMAGES.gpu} alt="GPU" className="w-full h-full object-cover" />
                                <div className="absolute inset-0 cinematic-vignette" />
                                <div className="absolute top-48 left-12">
                                    <h3 className="text-5xl md:text-7xl font-bold text-white tracking-tighter uppercase leading-none">ULTRA<br/>GRAFIKA</h3>
                                </div>
                            </motion.div>

                            <motion.div className="absolute inset-0 flex items-center justify-center bg-black" style={{ scale: devicesScale, opacity: devicesOpacity }}>
                                <img src={IMAGES.devices} alt="Devices" className="w-full h-full object-cover" />
                                <div className="absolute inset-0 cinematic-vignette opacity-40" />
                                <div className="absolute bottom-24 right-12 text-right">
                                    <h3 className="text-4xl md:text-6xl font-bold text-white tracking-tight mb-4 uppercase">KLINIKAI<br/>ELLÁTÁS</h3>
                                </div>
                            </motion.div>
                        </div>
                    </main>

                    <section id="services" className="py-32 bg-black px-6 border-t border-white/5">
                        <div className="max-w-7xl mx-auto text-center">
                            <h2 className="text-5xl md:text-7xl font-bold text-white tracking-tighter mb-20 uppercase">Szolgáltatások</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    { icon: "activity", title: "Diagnosztika", desc: "Műszeres hiba feltárás." },
                                    { icon: "cpu", title: "Karbantartás", desc: "Prémium újrapasztázás." },
                                    { icon: "hard-drive", title: "Bővítés", desc: "SSD és RAM tuning." }
                                ].map((s, i) => (
                                    <div key={i} className="p-10 bg-white/5 rounded-3xl border border-white/10 hover:border-brand-teal/30 transition-all">
                                        <div className="w-16 h-16 bg-brand-teal/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-brand-teal">
                                            <Icon name={s.icon} className="w-8 h-8" />
                                        </div>
                                        <h4 className="text-2xl font-bold text-white mb-4">{s.title}</h4>
                                        <p className="text-slate-400 font-light">{s.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="bg-[#050505] py-20 px-6 text-center border-t border-white/5">
                        <img src={IMAGES.logo} alt="Logo" className="h-16 mx-auto mb-8 invert opacity-50" />
                        <p className="text-slate-500 text-sm tracking-widest uppercase">&copy; 2024 CR Hardver Klinika</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
